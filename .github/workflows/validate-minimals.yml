name: Validate Minimal Variants

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**/minimal/**'
      - 'frontend/**/minimal/**'
      - 'shared/templates/**'
      - 'scripts/validate-minimals.sh'
  push:
    branches: [main, develop]
    paths:
      - 'backend/**/minimal/**'
      - 'frontend/**/minimal/**'
      - 'shared/templates/**'
      - 'scripts/validate-minimals.sh'
  workflow_dispatch: # Allow manual trigger

jobs:
  # ── Structural checks (fast, no build tools needed) ──────────────────────
  structural:
    name: Structural Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run structural checks
        run: |
          chmod +x scripts/validate-minimals.sh
          ./scripts/validate-minimals.sh

  # ── .NET build + test ────────────────────────────────────────────────────
  build-dotnet:
    name: Build & Test (.NET minimals)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [clean, feature, nlayer]
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build
        working-directory: backend/dotnet/${{ matrix.arch }}-architecture/minimal
        run: dotnet build --nologo -v q

      - name: Test
        working-directory: backend/dotnet/${{ matrix.arch }}-architecture/minimal
        run: dotnet test --nologo -v q

  # ── Spring Boot build + test ─────────────────────────────────────────────
  build-spring:
    name: Build & Test (Spring minimals)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [clean, feature, nlayer]
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Build
        working-directory: backend/spring/${{ matrix.arch }}-architecture/minimal
        run: ./mvnw -B compile

      - name: Test
        working-directory: backend/spring/${{ matrix.arch }}-architecture/minimal
        run: ./mvnw -B test

  # ── NestJS build + test ──────────────────────────────────────────────────
  build-nestjs:
    name: Build & Test (NestJS minimals)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [clean, feature, nlayer]
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Build
        working-directory: backend/nestjs/${{ matrix.arch }}-architecture/minimal
        run: |
          npm ci
          npm run build

      - name: Test
        working-directory: backend/nestjs/${{ matrix.arch }}-architecture/minimal
        run: npm test -- --passWithNoTests

  # ── Frontend build ──────────────────────────────────────────────────────
  build-frontend:
    name: Build (Frontend minimals)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - framework: vue
            ui: vuetify
          - framework: vue
            ui: primevue
          - framework: react
            ui: mui
          - framework: react
            ui: primereact
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Build
        working-directory: frontend/${{ matrix.framework }}/${{ matrix.ui }}/minimal
        run: |
          npm ci
          npm run build
