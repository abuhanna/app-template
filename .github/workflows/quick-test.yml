name: Quick Tests (Layer 1)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  quick-tests:
    name: Layer 1 - Quick Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            create-apptemplate/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install CLI dependencies & build
        run: cd create-apptemplate && npm ci && npm run build && npm run typecheck

      - name: Run Layer 1 tests
        run: npm run test:quick
