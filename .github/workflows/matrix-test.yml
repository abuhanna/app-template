name: Full Matrix Tests (Layer 2)

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 2 * * 0' # Weekly Sunday 2am UTC
  workflow_dispatch:
    inputs:
      full_matrix:
        description: 'Run all 98 combinations (default: critical subset)'
        type: boolean
        default: false

jobs:
  matrix-backend:
    name: Layer 2 - Backend (${{ matrix.backend }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        backend: [dotnet, spring, nestjs]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            create-apptemplate/package-lock.json

      - name: Setup .NET
        if: matrix.backend == 'dotnet'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Java
        if: matrix.backend == 'spring'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Install dependencies
        run: npm ci && cd create-apptemplate && npm ci

      - name: Run matrix tests (${{ matrix.backend }})
        run: npm run test:matrix
        env:
          E2E_ALL: ${{ inputs.full_matrix && '1' || '' }}
          BACKEND_FILTER: ${{ matrix.backend }}

  matrix-frontend:
    name: Layer 2 - Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            create-apptemplate/package-lock.json

      - name: Install dependencies
        run: npm ci && cd create-apptemplate && npm ci

      - name: Run frontend matrix tests
        run: npm run test:matrix
        env:
          E2E_ALL: ${{ inputs.full_matrix && '1' || '' }}
          FRONTEND_FILTER: 'true'
