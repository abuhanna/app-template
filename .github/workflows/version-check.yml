name: Version Consistency Check

on:
  pull_request:
    paths:
      - 'backend/**/*.csproj'
      - 'backend/**/pom.xml'
      - 'backend/**/package.json'
      - 'frontend/**/package.json'
      - '**/Dockerfile*'
      - 'scripts/versions/manifest.json'

jobs:
  check-versions:
    name: Check Version Consistency
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check version consistency
        run: npm run check-versions

      - name: Comment on PR if mismatches found
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ Version mismatch detected! Run `npm run sync-versions` to fix, or update `scripts/versions/manifest.json` if this is an intentional version change.'
            })
